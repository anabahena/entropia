# entropia-challenge-v3.2-fullstack
services:
  entropia-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entropia-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:////app/data/entropia.db
      - WINDOWS_UPLOAD_DIR=/app/data/uploads/windows
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://entropia-ollama:11434
    volumes:
      - ./backend/uploads:/app/data/uploads
      - ./backend/entropia.db:/app/data/entropia.db
    depends_on:
      redis:
        condition: service_started
      entropia-ollama:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  entropia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: entropia-frontend
    ports:
      - "3000:3000"
    environment:
      - API_URL=http://entropia-api:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      entropia-api:
        condition: service_healthy

  entropia-ollama:
    image: ollama/ollama:latest
    container_name: entropia-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  redis:
    image: redis:7-alpine
    container_name: entropia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  ollama_data:
  redis_data:
