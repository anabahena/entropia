# entropia-challenge-v3.2-fullstack
services:
  entropia-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entropia-api
    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data

    depends_on:
      redis:
        condition: service_started
      entropia-ollama:
        condition: service_started

    healthcheck:
      test: [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  entropia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: entropia-frontend
    ports:
      - "3000:3000"

    env_file:
      - .env

    depends_on:
      entropia-api:
        condition: service_healthy

  entropia-ollama:
    image: ollama/ollama:latest
    container_name: entropia-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  redis:
    image: redis:7-alpine
    container_name: entropia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  ollama_data:
  redis_data:
