version: "3.9"

services:

  entropia-ollama:
    build:
      context: ./ollama
    container_name: entropia-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0 # Asegura que acepte conexiones externas
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s # Un poco más de espacio entre pruebas
      timeout: 10s
      retries: 15
      start_period: 120s # Dale 2 minutos para bajar el modelo la primera vez


  redis:
    image: redis:7-alpine
    container_name: entropia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped


  entropia-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entropia-api
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - OLLAMA_BASE_URL=http://entropia-ollama:11434
      - OLLAMA_MODEL=llava
      - REDIS_URL=redis://redis:6379/0

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data

    depends_on:
      entropia-ollama:
        condition: service_healthy
      redis:
        condition: service_started

    restart: unless-stopped

    healthcheck:
      # Usamos python para hacer la petición en lugar de curl
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s


  entropia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: entropia-frontend
    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      entropia-api:
        condition: service_healthy

    restart: unless-stopped


volumes:
  ollama_data:
  redis_data: