version: "3.9"

services:

  entropia-ollama:
    build:
      context: ./ollama
    container_name: entropia-ollama
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:11434/api/tags"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s


  redis:
    image: redis:7-alpine
    container_name: entropia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped


  entropia-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: entropia-api

    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - OLLAMA_BASE_URL=http://entropia-ollama:11434
      - OLLAMA_MODEL=llava:7b
      - REDIS_URL=redis://redis:6379/0

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data

    depends_on:
      entropia-ollama:
        condition: service_started
      redis:
        condition: service_started

    restart: unless-stopped


  entropia-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: entropia-frontend

    ports:
      - "3000:3000"

    env_file:
      - .env

    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000

    depends_on:
      - entropia-api

    restart: unless-stopped


volumes:
  ollama_data:
  redis_data: